version: '3.9'

services:
  ingest:
    platform: linux/amd64
    build: .
    container_name: ingest
    restart: no
    command: python -m src.main
    network_mode: host
    # Pass the host GPUs into the container (CDI, verified working with
    # `podman run --device nvidia.com/gpu=all`). Required for CUDA benchmarks.
    devices:
      - nvidia.com/gpu=all
    env_file:
      - .env
    volumes:
      - .:/app
      - workspace:/workspace
  api:
    platform: linux/amd64
    build: .
    container_name: api
    restart: unless-stopped
    command: uvicorn src.api.main:app --host 0.0.0.0 --port ${API_PORT:-8001}
    network_mode: host
    env_file:
      - .env
    volumes:
      - .:/app
      - workspace:/workspace
volumes:
  workspace:
